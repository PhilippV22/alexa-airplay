configuration:
  log_level:
    name: Log-Level
    description: Detailgrad der Add-on-Logs.
  adapter:
    name: Bluetooth-Adapter
    description: Bluetooth-Controller des Home-Assistant-Hosts, meistens hci0.
  reconnect_interval_seconds:
    name: Reconnect-Intervall
    description: Sekunden zwischen Bluetooth- und Prozess-Pruefungen.
  airplay_port_base:
    name: AirPlay TCP Startport
    description: Erster TCP-Port fuer die AirPlay-Empfaenger.
  udp_port_base:
    name: AirPlay UDP Startport
    description: Erster UDP-Portbereich fuer die AirPlay-Empfaenger.
  targets:
    name: Echo-Ziele
    description: Ein Eintrag pro Echo, das als AirPlay-Ziel erscheinen soll.
    fields:
      name:
        name: Name
        description: Interner Anzeigename fuer Logs.
      airplay_name:
        name: AirPlay-Name
        description: Name, der auf iPhone, iPad oder Mac angezeigt wird.
      mac:
        name: Bluetooth-MAC
        description: Bluetooth-Adresse des Echo.
      enabled:
        name: Aktiviert
        description: Erstellt und startet diesen AirPlay-Empfaenger.
